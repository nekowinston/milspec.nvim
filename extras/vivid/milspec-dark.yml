  tooling:
    foreground: turquoise

    vsc:
      git:
        foreground: orange
      hg:
        foreground: blue

      packaging:
        go:
          foreground: blue
        python:
          foreground: blue
        ruby:
          foreground: red
        v:
          foreground: blue

    continuous-integration:
      foreground: green

media:
  foreground: rose

office:
  foreground: red

archives:
  foreground: sepia
  font-style: underline

executable:
  foreground: red
  font-style: bold

unimportant:
  foreground: bgGray
